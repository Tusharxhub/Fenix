version: '3.9'
services:
  fenix-app:
    container_name: fenix-app
    build:
      context: .
      target: dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: '1'
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
